<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>油脂产区天气风险终端</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --risk-severe: #c0392b;
  --risk-pressure: #e67e22;
  --risk-watch: #d4a017;
  --risk-mild: #f0d264;
  --risk-normal: #27ae60;
  --risk-none: #94a3b8;
  --oil-palm: #15803d;
  --oil-soybean: #a16207;
  --oil-rapeseed-canola: #2563eb;
  --oil-sunflower: #7c3aed;
  --oil-coconut: #0891b2;
  --bg: #eef1f4;
  --panel: #ffffff;
  --panel-soft: #f7f8fa;
  --ink: #171b22;
  --muted: #5f6b7a;
  --muted-2: #8b95a3;
  --border: #d6dae0;
  --shadow: 0 1px 2px rgba(15,23,42,0.06), 0 6px 16px rgba(15,23,42,0.06);
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
  line-height: 1.5;
}
button, select {
  font: inherit;
}
button {
  cursor: pointer;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  min-width: 0;
}
header {
  height: 48px;
  flex: 0 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 9px 16px;
  background: #171b22;
  color: #fff;
}
header h1 {
  font-size: 15px;
  font-weight: 650;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.header-meta {
  color: #aab2bd;
  font-size: 11px;
  white-space: nowrap;
}
.toolbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 8px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.filter-group {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  color: var(--muted-2);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.45px;
  text-transform: uppercase;
}
.crop-tabs,
.layer-toggle,
.risk-tabs {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--panel-soft);
}
.crop-tab,
.layer-btn,
.risk-tab,
.toolbar button,
.toolbar select {
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  height: 28px;
  padding: 0 9px;
  font-size: 12px;
  white-space: nowrap;
}
.crop-tab.active,
.layer-btn.active,
.risk-tab.active {
  color: #fff;
  background: #222833;
}
.layer-btn:disabled {
  opacity: 0.45;
  cursor: default;
}
.toolbar select {
  min-width: 110px;
  border-color: var(--border);
  background: #fff;
}
.toolbar #btn-reset {
  border-color: var(--border);
  background: #fff;
}
.more-filters {
  position: relative;
  margin-left: auto;
}
.more-filters > summary {
  list-style: none;
  height: 28px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}
.more-filters > summary::-webkit-details-marker { display: none; }
.more-filters > summary::after { content: " +"; color: var(--muted-2); }
.more-filters[open] > summary::after { content: " -"; }
.more-filter-panel {
  position: absolute;
  top: 34px;
  right: 0;
  z-index: 800;
  display: grid;
  grid-template-columns: repeat(3, minmax(120px, 1fr));
  gap: 8px;
  min-width: 430px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow);
}
.more-filter-field label {
  display: block;
  margin-bottom: 4px;
  color: var(--muted-2);
  font-size: 10px;
  font-weight: 700;
}
.more-filter-field select { width: 100%; }
.today-summary {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: auto repeat(4, minmax(96px, auto)) minmax(260px, 1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  background: #f8fafc;
}
.summary-title {
  font-size: 12px;
  font-weight: 750;
  color: #202733;
  white-space: nowrap;
}
.summary-stat {
  padding-left: 10px;
  border-left: 1px solid #dfe3e8;
}
.summary-stat strong {
  display: block;
  font-size: 15px;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.summary-stat span {
  color: var(--muted-2);
  font-size: 9.5px;
}
.summary-focus {
  min-width: 0;
  color: #303846;
  font-size: 11.5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.summary-focus b { color: var(--muted-2); font-size: 10px; margin-right: 5px; }
.summary-meta {
  color: var(--muted);
  font-size: 10.5px;
  text-align: right;
  white-space: nowrap;
}
#body {
  display: flex;
  flex: 1;
  min-height: 0;
  min-width: 0;
}
#map-wrap {
  flex: 1 1 auto;
  position: relative;
  min-width: 0;
  min-height: 0;
  background: #dfe5eb;
}
#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}
.map-overlay {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 500;
  width: min(310px, calc(100% - 24px));
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.96);
  box-shadow: var(--shadow);
}
.map-overlay h2 {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.ov-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.ov-item {
  padding: 6px 7px;
  border-radius: 5px;
  background: var(--panel-soft);
}
.ov-item .num {
  font-size: 16px;
  line-height: 1.1;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.ov-item .lbl {
  margin-top: 2px;
  color: var(--muted-2);
  font-size: 9.5px;
  letter-spacing: 0.2px;
}
.map-status {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
}
.map-notice {
  margin-top: 6px;
  padding: 7px 8px;
  border-left: 3px solid var(--risk-watch);
  border-radius: 4px;
  background: #fffbeb;
  color: #7c4a03;
  font-size: 11px;
}
.map-legend,
.oil-legend {
  position: absolute;
  z-index: 500;
  right: 14px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.96);
  box-shadow: var(--shadow);
  font-size: 10px;
}
.map-legend {
  bottom: 14px;
}
.oil-legend {
  bottom: 136px;
}
.legend-title {
  font-weight: 700;
  margin-bottom: 4px;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--muted-2);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  margin: 2px 0;
}
.legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex: 0 0 auto;
}
.legend-dot {
  border-radius: 50%;
}
#detail-panel {
  flex: 0 0 460px;
  width: 460px;
  min-width: 360px;
  max-width: 520px;
  overflow-y: auto;
  background: var(--panel);
  border-left: 1px solid var(--border);
}
.empty {
  padding: 44px 22px;
  color: var(--muted-2);
  text-align: center;
}
.detail-header {
  padding: 16px 18px 14px;
  border-bottom: 1px solid #e9ebee;
  background: linear-gradient(180deg, #f8f9fb 0%, #fff 100%);
}
.detail-block {
  padding: 14px 18px;
  border-bottom: 1px solid #eef0f2;
}
.detail-header h2 {
  font-size: 17px;
  line-height: 1.3;
  margin-bottom: 6px;
  letter-spacing: -0.2px;
}
.subtitle {
  color: var(--muted);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.detail-block h3 {
  margin-bottom: 10px;
  color: var(--muted-2);
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.detail-block p,
.detail-block li {
  color: #2d3440;
  font-size: 12.5px;
  line-height: 1.55;
}
.detail-block ol {
  padding-left: 18px;
}
.detail-block li {
  margin: 4px 0;
}
.data-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.data-grid.cols-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.data-grid.cols-4 {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}
.data-cell {
  min-width: 0;
  padding: 8px 10px;
  border: 1px solid #e9ebee;
  border-radius: 6px;
  background: var(--panel-soft);
}
.data-cell .lbl {
  display: block;
  color: var(--muted-2);
  font-size: 10px;
  margin-bottom: 2px;
  letter-spacing: 0.2px;
}
.data-cell .val {
  display: block;
  overflow-wrap: anywhere;
  font-size: 13.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #1e2530;
}
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 2px 8px;
  border-radius: 999px;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  vertical-align: middle;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin: 0 5px 5px 0;
  padding: 3px 8px;
  border-radius: 999px;
  background: #eef1f5;
  color: #3d4654;
  font-size: 11px;
}
.status-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  min-height: 21px;
  padding: 2px 7px;
  border: 1px solid #d9dee5;
  border-radius: 999px;
  background: #f8fafc;
  color: #46515f;
  font-size: 10px;
  font-weight: 650;
}
.status-badge.good { border-color: #bbdfc8; background: #f0fdf4; color: #166534; }
.status-badge.warn { border-color: #f1d28f; background: #fffbeb; color: #92400e; }
.status-badge.info { border-color: #bfdbfe; background: #eff6ff; color: #1e40af; }
.status-notice {
  margin-top: 8px;
  padding: 7px 9px;
  border-left: 3px solid #d4a017;
  border-radius: 4px;
  background: #fffbeb;
  color: #72510b;
  font-size: 11px;
}
.conclusion-line {
  padding: 10px 11px;
  border-left: 3px solid #334155;
  border-radius: 4px;
  background: #f8fafc;
  color: #202733;
  font-size: 13px;
  line-height: 1.6;
}
.tag-groups {
  display: grid;
  gap: 10px;
}
.tag-group {
  padding: 9px;
  border: 1px solid #e6e9ed;
  border-radius: 7px;
  background: #fafbfc;
}
.tag-group-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
  color: #3d4654;
  font-size: 11px;
  font-weight: 750;
}
.tag-group-title span { color: var(--muted-2); font-size: 9.5px; }
.risk-tag-card {
  padding: 7px 8px;
  border-left: 3px solid var(--tag-color, #94a3b8);
  border-radius: 4px;
  background: #fff;
}
.risk-tag-card + .risk-tag-card { margin-top: 6px; }
.risk-tag-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
}
.risk-tag-evidence { margin-top: 4px; color: var(--muted); font-size: 10.5px; line-height: 1.45; }
.risk-tag-flags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.risk-tag-flags span { padding: 1px 5px; border-radius: 3px; background: #eef1f5; color: #596474; font-size: 9.5px; }
.evidence-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.evidence-card {
  min-width: 0;
  padding: 9px 10px;
  border: 1px solid #e9ebee;
  border-radius: 6px;
  background: var(--panel-soft);
}
.evidence-card b { display: block; margin-bottom: 3px; color: var(--muted-2); font-size: 10px; }
.evidence-card strong { display: block; margin-bottom: 2px; color: #1e2530; font-size: 13px; }
.evidence-card p { color: var(--muted); font-size: 10.5px; line-height: 1.4; }
.oil-pill::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 2px;
  background: var(--oil-color, var(--risk-none));
}
.risk-stack {
  display: flex;
  height: 16px;
  overflow: hidden;
  border-radius: 4px;
  background: #e8ebef;
}
.risk-stack-seg {
  min-width: 2px;
  height: 100%;
}
.risk-stack-labels {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  margin-top: 6px;
  color: var(--muted);
  font-size: 10.5px;
}
.region-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.region-row {
  width: 100%;
  border: 1px solid #e9ebee;
  border-radius: 6px;
  background: #fff;
  padding: 8px 10px;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.region-row:hover {
  border-color: #b0b8c4;
  background: #f7f8fa;
}
.region-row .subtitle {
  margin-top: 3px;
  font-size: 11px;
}
.chart-box {
  position: relative;
  height: 172px;
  margin-top: 10px;
}
.chart-box.compact {
  height: 140px;
}
.two-charts {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
.chart-title {
  color: var(--muted-2);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 2px;
}
.chart-box canvas {
  border-radius: 4px;
}
.disturbed-bar-wrap {
  margin-top: 10px;
}
.disturbed-bar {
  display: flex;
  height: 14px;
  overflow: hidden;
  border-radius: 3px;
  background: #e8ebef;
  margin-bottom: 6px;
}
.disturbed-bar-fill {
  min-width: 0;
  height: 100%;
  transition: width 0.3s ease;
}
.disturbed-bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}
.leaflet-tooltip.country-map-label,
.leaflet-tooltip.region-map-label {
  padding: 0;
  border: 0;
  background: transparent;
  box-shadow: none;
}
.map-label {
  display: grid;
  grid-template-columns: 3px auto;
  gap: 4px;
  align-items: stretch;
  max-width: 136px;
  padding: 3px 5px;
  border: 1px solid rgba(75,85,99,0.18);
  border-radius: 5px;
  background: rgba(255,255,255,0.93);
  box-shadow: 0 1px 3px rgba(15,23,42,0.12);
  color: #202733;
  font-size: 9.5px;
  line-height: 1.2;
  white-space: normal;
}
.map-label .stripe {
  border-radius: 999px;
  background: var(--oil-color, var(--risk-none));
}
.map-label strong {
  display: block;
  overflow-wrap: anywhere;
  font-size: 9.5px;
  font-weight: 650;
}
.map-label span:last-child {
  color: var(--muted);
  font-size: 8.5px;
}
.region-map-label .map-label {
  max-width: 118px;
  font-size: 8.5px;
  padding: 2px 4px;
}
.region-map-label .map-label strong {
  font-size: 8.5px;
}
.region-map-label .map-label span:last-child {
  font-size: 8px;
}
.leaflet-container {
  background: #dfe5eb;
}
#detail-panel::-webkit-scrollbar { width: 6px; }
#detail-panel::-webkit-scrollbar-track { background: transparent; }
#detail-panel::-webkit-scrollbar-thumb { background: #c9ced6; border-radius: 6px; }
@media (max-width: 980px) {
  #detail-panel { flex-basis: 400px; width: 400px; }
  .today-summary { grid-template-columns: auto repeat(4, minmax(82px, auto)) 1fr; }
  .summary-meta { display: none; }
}
@media (max-width: 760px) {
  html, body { overflow: auto; }
  #app { min-height: 100dvh; height: auto; }
  header { padding-inline: 10px; }
  .header-meta { white-space: normal; text-align: right; line-height: 1.25; }
  .toolbar { align-items: flex-start; padding: 8px 10px; gap: 7px; }
  .filter-group { align-items: flex-start; flex-direction: column; gap: 3px; }
  .crop-tabs, .risk-tabs { flex-wrap: wrap; }
  .more-filters { margin-left: 0; }
  .more-filter-panel { position: fixed; top: 124px; left: 10px; right: 10px; min-width: 0; grid-template-columns: 1fr; }
  .today-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 8px 10px; }
  .summary-title, .summary-focus { grid-column: 1 / -1; }
  .summary-stat { padding-left: 7px; }
  .summary-meta { display: block; grid-column: 1 / -1; text-align: left; }
  #body { flex-direction: column; }
  #map-wrap { min-height: 54vh; }
  #detail-panel {
    flex: 0 0 46vh;
    width: 100%;
    min-width: 0;
    max-width: none;
    border-left: 0;
    border-top: 1px solid var(--border);
  }
  .map-legend,
  .oil-legend { right: 10px; }
  .oil-legend { display: none; }
  .evidence-grid { grid-template-columns: 1fr; }
  .data-grid.cols-3,
  .data-grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <h1>油脂产区天气风险终端</h1>
    </div>
    <div class="header-meta">版本 <span id="meta-version">v2.1-ui1</span>｜数据 <span id="meta-date">-</span>｜规则 <span id="meta-rule">risk_label_v4</span></div>
  </header>

  <div class="toolbar">
    <div class="filter-group">
      <span class="filter-label">油种</span>
      <div class="crop-tabs" id="crop-tabs">
        <button class="crop-tab active" type="button" data-crop="all">全部</button>
        <button class="crop-tab" type="button" data-crop="palm">棕榈</button>
        <button class="crop-tab" type="button" data-crop="soybean">大豆</button>
        <button class="crop-tab" type="button" data-crop="rapeseed_canola">菜籽</button>
        <button class="crop-tab" type="button" data-crop="sunflower">葵花</button>
        <button class="crop-tab" type="button" data-crop="coconut">椰子</button>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">视图</span>
      <div class="layer-toggle">
        <button class="layer-btn active" id="layer-country" type="button" data-layer="country">国家层</button>
        <button class="layer-btn" id="layer-region" type="button" data-layer="region" disabled>地区层</button>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">风险</span>
      <div class="risk-tabs" id="risk-tabs">
        <button class="risk-tab active" type="button" data-risk="all">全部</button>
        <button class="risk-tab" type="button" data-risk="gte4">显著以上</button>
        <button class="risk-tab" type="button" data-risk="gte3">重点以上</button>
        <button class="risk-tab" type="button" data-risk="lte2">正常/关注</button>
      </div>
    </div>
    <details class="more-filters" id="more-filters">
